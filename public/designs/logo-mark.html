<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
<title>IMPOTA — Logo Mark</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--zinc-950:#09090b;--zinc-900:#18181b;--amber-500:#f59e0b;--gold:#fbbf24;--cream:#fafaf9}
  body{width:1080px;height:1080px;overflow:hidden;background:var(--cream);font-family:'Inter',sans-serif;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:60px;padding:80px}

  .pair{display:grid;grid-template-columns:1fr 1fr;gap:0;width:100%;border:1px solid rgba(9,9,11,0.08);border-radius:20px;overflow:hidden}
  .swatch{padding:90px 60px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;min-height:380px}
  .swatch.light{background:var(--cream)}
  .swatch.dark{background:var(--zinc-950)}

  .wordmark{font-weight:900;letter-spacing:-7px;line-height:1;font-size:140px}
  .wordmark .dot{color:var(--gold)}
  .swatch.light .wordmark{color:var(--zinc-950)}
  .swatch.dark .wordmark{color:var(--cream)}

  .tag{font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;opacity:0.55}
  .swatch.light .tag{color:var(--zinc-950)}
  .swatch.dark .tag{color:var(--cream)}

  /* Scale demo row */
  .label{font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--zinc-900);opacity:0.5;margin-top:20px}
  .scales{display:flex;gap:40px;align-items:baseline}
  .scales .wordmark.lg{font-size:80px;letter-spacing:-4px;color:var(--zinc-950)}
  .scales .wordmark.md{font-size:48px;letter-spacing:-2.4px;color:var(--zinc-950)}
  .scales .wordmark.sm{font-size:28px;letter-spacing:-1.4px;color:var(--zinc-950)}
</style>
</head>
<body>
  <div class="pair">
    <div class="swatch light">
      <div class="wordmark">impota<span class="dot">.</span></div>
      <div class="tag">Light surface</div>
    </div>
    <div class="swatch dark">
      <div class="wordmark">impota<span class="dot">.</span></div>
      <div class="tag">Dark surface</div>
    </div>
  </div>

  <div class="label">— scales (light surface) —</div>
  <div class="scales">
    <div class="wordmark lg">impota<span class="dot">.</span></div>
    <div class="wordmark md">impota<span class="dot">.</span></div>
    <div class="wordmark sm">impota<span class="dot">.</span></div>
  </div>
</body>
</html>
