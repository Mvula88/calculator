<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
<title>IMPOTA — Logo Mark</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--zinc-950:#09090b;--zinc-900:#18181b;--amber-500:#f59e0b;--gold:#fbbf24;--cream:#fafaf9}
  body{width:1080px;height:1080px;overflow:hidden;background:var(--cream);font-family:'Inter',sans-serif;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:80px}

  /* Wordmark badge — the actual logo lockup */
  .badge{background:var(--zinc-950);padding:80px 120px;border-radius:24px;display:inline-flex;align-items:baseline;box-shadow:0 24px 60px rgba(9,9,11,0.18)}
  .wordmark{font-size:200px;font-weight:900;letter-spacing:-10px;color:var(--cream);line-height:1}
  .wordmark .dot{color:var(--gold)}

  /* Smaller copies to show how it scales */
  .row{display:flex;gap:40px;align-items:center}
  .badge.sm{padding:24px 36px;border-radius:14px;box-shadow:0 8px 24px rgba(9,9,11,0.14)}
  .badge.sm .wordmark{font-size:64px;letter-spacing:-3px}
  .badge.xs{padding:14px 22px;border-radius:10px;box-shadow:0 4px 14px rgba(9,9,11,0.12)}
  .badge.xs .wordmark{font-size:32px;letter-spacing:-1.5px}

  .label{font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--zinc-900);opacity:0.5}
</style>
</head>
<body>
  <div class="badge">
    <span class="wordmark">impota<span class="dot">.</span></span>
  </div>

  <div class="label">— scales —</div>

  <div class="row">
    <div class="badge sm"><span class="wordmark">impota<span class="dot">.</span></span></div>
    <div class="badge xs"><span class="wordmark">impota<span class="dot">.</span></span></div>
  </div>
</body>
</html>
