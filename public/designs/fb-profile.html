<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IMPOTA — Profile</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{--zinc-950:#09090b;--zinc-900:#18181b;--amber-500:#f59e0b;--gold:#fbbf24}
  body{width:1080px;height:1080px;overflow:hidden;background:var(--zinc-950);position:relative;display:flex;align-items:center;justify-content:center}

  /* Safe circle: Facebook crops to the 880x880 inscribed circle */
  .safe{position:relative;width:880px;height:880px;border-radius:50%;display:flex;align-items:center;justify-content:center}

  .logo{width:640px;height:auto;display:block}
</style>
</head>
<body>
  <div class="safe">
    <img class="logo" src="/impota-logo.png" alt="IMPOTA">
  </div>
</body>
</html>
