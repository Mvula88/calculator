<style>
:root{--primary:#18181b;--secondary:#fbbf24;--bg:#fafaf9;--card:#fff;--border:#e4e4e7;--text:#18181b;--text-light:#71717a}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text)}

.topbar{background:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar-left img{height:42px}
.topbar-left h1{font-size:1rem;font-weight:700;color:var(--text)}
.topbar-left h1 span{color:var(--secondary)}
.topbar a{color:var(--primary);font-weight:600;font-size:0.9rem;text-decoration:none}

.container{max-width:1200px;margin:0 auto;padding:32px 24px}

.intro{text-align:center;margin-bottom:40px}
.intro h2{font-size:1.6rem;margin-bottom:8px}
.intro p{color:var(--text-light);font-size:0.95rem;max-width:560px;margin:0 auto}

/* Platform tabs */
.platform-tabs{display:flex;justify-content:center;gap:8px;margin-bottom:32px;flex-wrap:wrap}
.platform-tab{padding:8px 18px;border:1.5px solid var(--border);border-radius:20px;font-size:0.85rem;font-weight:600;cursor:pointer;background:var(--card);color:var(--text-light);transition:all 0.15s;font-family:inherit}
.platform-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* Design grid */
.design-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(320px, 1fr));gap:24px}

.design-item{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:box-shadow 0.2s}
.design-item:hover{box-shadow:0 6px 24px rgba(0,0,0,0.08)}
.design-preview{position:relative;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden}
.design-preview iframe{border:none;width:100%;transform-origin:top left}
.design-info{padding:16px}
.design-info h3{font-size:0.95rem;margin-bottom:4px}
.design-info .meta{font-size:0.78rem;color:var(--text-light);margin-bottom:12px}
.design-info .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.design-info .tag{padding:3px 10px;background:var(--bg);border-radius:12px;font-size:0.72rem;font-weight:500;color:var(--text-light)}
.design-actions{display:flex;gap:8px}
.design-actions a,.design-actions button{padding:8px 16px;border-radius:6px;font-size:0.82rem;font-weight:600;cursor:pointer;font-family:inherit;text-decoration:none;border:none;display:inline-flex;align-items:center;gap:6px}
.btn-view{background:var(--primary);color:#fff}
.btn-download{background:var(--secondary);color:var(--primary)}
.btn-view:hover{opacity:0.9}
.btn-download:hover{opacity:0.9}

.empty{text-align:center;padding:60px 20px;color:var(--text-light)}
.empty h3{margin-bottom:8px;color:var(--text)}

/* Sizes legend */
.sizes{display:flex;justify-content:center;gap:20px;margin-bottom:24px;font-size:0.78rem;color:var(--text-light);flex-wrap:wrap}
.sizes span{display:flex;align-items:center;gap:6px}
.sizes .dot{width:8px;height:8px;border-radius:50%}

@media(max-width:768px){
    .design-grid{grid-template-columns:1fr}
    .container{padding:20px 16px}
}
</style>
</head>

<div class="topbar">

let currentFilter = 'all';

function filterDesigns(platform) {
    currentFilter = platform;
    document.querySelectorAll('.platform-tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
    renderDesigns();
}

function renderDesigns() {
    const grid = document.getElementById('designGrid');
    const filtered = currentFilter === 'all' ? designs : designs.filter(d => d.platform === currentFilter);

    if (!filtered.length) {
        grid.innerHTML = '<div class="empty"><h3>No designs in this category yet</h3><p>Ask Claude Code to generate one!</p></div>';
        return;
    }

    // Calculate preview dimensions
    grid.innerHTML = filtered.map(d => {
        const [w, h] = d.size.split('x').map(Number);
        const previewWidth = 340;
        const scale = previewWidth / w;
        const previewHeight = Math.min(h * scale, 400);

        return `
        <div class="design-item" data-platform="${d.platform}">
            <div class="design-preview" style="height:${previewHeight}px">
                <iframe src="${d.file}" style="width:${w}px;height:${h}px;transform:scale(${scale});pointer-events:none;" scrolling="no"></iframe>
            </div>
            <div class="design-info">
                <h3>${d.title}</h3>
                <div class="meta">${d.size} &middot; ${d.date}</div>
                <div class="tags">
                    <span class="tag">${d.platform}</span>
                    <span class="tag">${d.type}</span>
                </div>
                <div class="design-actions">
                    <a href="${d.file}" target="_blank" class="btn-view">Open Full Size</a>
                    <button class="btn-download" onclick="downloadDesign(${JSON.stringify(d).replace(/"/g, '&quot;')}, this)">Download PNG</button>
                </div>
            </div>
        </div>`;
    }).join('');
}

renderDesigns();

// --- Download design as PNG at native resolution ---
async function downloadDesign(d, btn) {
    const originalText = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Rendering...';
    btn.style.opacity = '0.6';
    btn.style.cursor = 'wait';

    const [w, h] = d.size.split('x').map(Number);

    // Create a hidden, full-size iframe rendered via srcdoc so it stays
    // same-origin with the parent regardless of any apex<->www redirects
    // or service-worker interception.
    const frame = document.createElement('iframe');
    frame.style.cssText = `position:fixed;top:-10000px;left:-10000px;width:${w}px;height:${h}px;border:0;`;
    document.body.appendChild(frame);

    try {
        // Fetch the design HTML and inject a <base> tag so its absolute
        // paths (/Background%20Images/..., /impota-logo.png) resolve
        // against the parent's origin instead of about:srcdoc.
        const fileUrl = new URL(d.file, window.location.href).href;
        let html = await fetch(fileUrl).then(r => {
            if (!r.ok) throw new Error(`fetch ${r.status} for ${d.file}`);
            return r.text();
        });
        const baseTag = `<base href="${window.location.origin}/">`;
        html = html.replace(/<head([^>]*)>/i, `<head$1>${baseTag}`);

        // Load via srcdoc and wait for the iframe to fully load
        await new Promise((resolve, reject) => {
            frame.onload = resolve;
            frame.onerror = reject;
            setTimeout(reject, 15000);
            frame.srcdoc = html;
        });

        const innerDoc = frame.contentDocument;
        if (!innerDoc) {
            throw new Error('iframe contentDocument null after srcdoc load');
        }
        if (innerDoc.fonts && innerDoc.fonts.ready) {
            await innerDoc.fonts.ready;
        }
        // Let any inline images (logo) settle
        const images = Array.from(innerDoc.images || []);
        await Promise.all(images.map(img => img.complete ? Promise.resolve() : new Promise(r => {
            img.onload = img.onerror = r;
        })));

        // Pre-load CSS background images with crossorigin so html2canvas
        // can read them onto an un-tainted canvas
        const bgUrls = new Set();
        const win = innerDoc.defaultView || frame.contentWindow;
        if (win && typeof win.getComputedStyle === 'function') {
            innerDoc.querySelectorAll('*').forEach(el => {
                try {
                    const bg = win.getComputedStyle(el).backgroundImage;
                    const m = bg && bg.match(/url\(["']?([^"')]+)["']?\)/);
                    if (m && !m[1].startsWith('data:')) bgUrls.add(m[1]);
                } catch (_) { /* ignore per-element style failures */ }
            });
        }
        await Promise.all([...bgUrls].map(url => new Promise(r => {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = img.onerror = r;
            img.src = url;
        })));
        await new Promise(r => setTimeout(r, 300));

        // Render via html2canvas against the iframe body
        const canvas = await html2canvas(innerDoc.body, {
            width: w,
            height: h,
            windowWidth: w,
            windowHeight: h,
            backgroundColor: null,
            useCORS: true,
            allowTaint: false,
            scale: 1,
            logging: false,
        });

        // Trigger download
        const link = document.createElement('a');
        const safeTitle = d.title.replace(/[^a-z0-9]+/gi, '-').toLowerCase().replace(/^-|-$/g, '');
        link.download = `impota-${safeTitle}-${w}x${h}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();

        btn.textContent = 'Downloaded ✓';
        btn.style.background = '#27AE60';
        btn.style.color = '#fff';
    } catch (e) {
        console.error('Download failed:', e);
        const msg = (e && (e.name || e.message)) ? `${e.name || ''}: ${e.message || ''}`.trim() : 'Failed';
        btn.textContent = msg.slice(0, 120);
        btn.title = (e && e.stack) || String(e);
        btn.style.background = '#E74C3C';
        btn.style.color = '#fff';
        btn.style.fontSize = '0.7rem';
        btn.style.whiteSpace = 'normal';
        btn.style.lineHeight = '1.2';
    } finally {
        document.body.removeChild(frame);
        setTimeout(() => {
            btn.disabled = false;
            btn.textContent = originalText;
            btn.style.background = '';
            btn.style.color = '';
            btn.style.opacity = '';
            btn.style.cursor = '';
        }, 2400);
    }
}
